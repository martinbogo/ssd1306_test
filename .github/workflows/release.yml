name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build FAP and create release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install ufbt
        run: pip install ufbt

      - name: Pull Momentum firmware SDK
        run: ufbt update --index-url=https://up.momentum-fw.dev/firmware/directory.json

      - name: Build FAP
        run: ufbt

      - name: Rename FAP to include tag
        run: |
          TAG=${{ github.ref_name }}
          cp dist/ssd1306_test.fap dist/ssd1306_test_${TAG}.fap

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/ssd1306_test_${{ github.ref_name }}.fap
          generate_release_notes: true
          fail_on_unmatched_files: true
